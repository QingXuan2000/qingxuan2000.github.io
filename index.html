<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QxBit Studio — 我们构建数字杠杆</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

  <!-- ========== 导航栏 ========== -->
  <nav class="nav" id="nav">
    <div class="nav-inner">
      <!-- Logo 标识 -->
      <a href="#hero" class="nav-logo" aria-label="QxBit Studio 首页">
        <svg class="logo-symbol" viewBox="0 0 40 40" width="32" height="32">
          <path d="M20 2 A18 18 0 0 1 20 38 A18 18 0 0 1 20 2 Z M20 10.5 A9.5 9.5 0 0 1 20 29.5 A9.5 9.5 0 0 1 20 10.5 Z" fill="currentColor" fill-rule="evenodd"/>
          <line x1="18" y1="18" x2="38" y2="38" stroke="currentColor" stroke-width="8" stroke-linecap="round"/>
        </svg>
      </a>
      <!-- 菜单 -->
      <ul class="nav-menu">
        <li><a href="#works" class="nav-link">作品</a></li>
        <li><a href="#services" class="nav-link">服务</a></li>
        <li><a data-link="blog" class="nav-link nav-link--external" target="_blank" rel="noopener">Blog</a></li>
        <li><a href="#footer" class="nav-link">联系</a></li>
      </ul>
    </div>
  </nav>

  <!-- ========== 首屏 ========== -->
  <section class="hero" id="hero">
    <div class="hero-grid">
      <!-- 装饰几何元素 -->
      <div class="hero-geo" aria-hidden="true">
        <svg viewBox="0 0 200 200" class="hero-geo-svg">
          <defs>
            <pattern id="grid" width="16" height="16" patternUnits="userSpaceOnUse" x="16" y="16">
              <path d="M 0 0 L 16 0 L 16 16 L 0 16 Z" fill="none" stroke="currentColor" stroke-width="0.5" opacity="0.18"/>
            </pattern>
          </defs>
          <!-- 网格底纹 -->
          <rect width="200" height="200" fill="url(#grid)" class="draw-fade" style="--d: 0s"/>
          <!-- 主圆组 -->
          <circle cx="96" cy="96" r="80" fill="none" stroke="currentColor" stroke-width="0.6" opacity="0.8" class="draw-stroke" style="--plen: 503; --d: 0.5s"/>
          <circle cx="96" cy="96" r="64" fill="none" stroke="currentColor" stroke-width="0.4" opacity="0.45" stroke-dasharray="4 6" class="draw-fade" style="--to: 0.45; --d: 1.0s"/>
          <circle cx="96" cy="96" r="48" fill="none" stroke="currentColor" stroke-width="0.6" opacity="0.8" class="draw-stroke" style="--plen: 302; --d: 0.7s"/>
          <!-- 十字轴线 -->
          <line x1="96" y1="0" x2="96" y2="200" stroke="currentColor" stroke-width="0.6" opacity="0.4" class="draw-stroke" style="--plen: 200; --d: 0.15s"/>
          <line x1="0" y1="96" x2="200" y2="96" stroke="currentColor" stroke-width="0.6" opacity="0.4" class="draw-stroke" style="--plen: 200; --d: 0.15s"/>
          <!-- 对角线 -->
          <line x1="16" y1="16" x2="176" y2="176" stroke="currentColor" stroke-width="0.3" opacity="0.22" class="draw-stroke" style="--plen: 227; --d: 1.1s"/>
          <line x1="176" y1="16" x2="16" y2="176" stroke="currentColor" stroke-width="0.3" opacity="0.22" class="draw-stroke" style="--plen: 227; --d: 1.25s"/>
          <!-- 外框 -->
          <rect x="32" y="32" width="128" height="128" fill="none" stroke="currentColor" stroke-width="0.6" opacity="0.8" class="draw-stroke" style="--plen: 512; --d: 0.3s"/>
          <!-- 偏移小方形 -->
          <rect x="112" y="48" width="32" height="32" fill="none" stroke="currentColor" stroke-width="0.6" opacity="0.8" class="draw-stroke" style="--plen: 128; --d: 1.4s"/>
          <!-- 偏移小圆 -->
          <circle cx="48" cy="144" r="32" fill="none" stroke="currentColor" stroke-width="0.6" opacity="0.8" class="draw-stroke" style="--plen: 201; --d: 1.1s"/>
          <!-- 强调色点缀 — 小填充方块 -->
          <rect x="126" y="62" width="4" height="4" fill="#ff3300" opacity="0.7" class="draw-dot" style="--to: 0.7; --d: 2.7s"/>
          <rect x="62" y="130" width="4" height="4" fill="#ff3300" opacity="0.7" class="draw-dot" style="--to: 0.7; --d: 2.8s"/>
          <!-- 强调色点缀 — 轴线端点圆 -->
          <circle cx="96" cy="32" r="2" fill="#ff3300" opacity="0.55" class="draw-dot" style="--to: 0.55; --d: 2.9s"/>
          <circle cx="160" cy="96" r="2" fill="#ff3300" opacity="0.55" class="draw-dot" style="--to: 0.55; --d: 3.0s"/>
          <circle cx="32" cy="96" r="2" fill="#ff3300" opacity="0.55" class="draw-dot" style="--to: 0.55; --d: 3.1s"/>
          <circle cx="96" cy="160" r="2" fill="#ff3300" opacity="0.55" class="draw-dot" style="--to: 0.55; --d: 3.2s"/>
          <!-- 中心点 -->
          <circle cx="96" cy="96" r="1.5" fill="currentColor" opacity="0.9" class="draw-dot" style="--to: 0.9; --d: 2.5s"/>
          <!-- 四角节点 -->
          <circle cx="32" cy="32" r="1" fill="currentColor" opacity="0.5" class="draw-dot" style="--to: 0.5; --d: 2.0s"/>
          <circle cx="160" cy="32" r="1" fill="currentColor" opacity="0.5" class="draw-dot" style="--to: 0.5; --d: 2.1s"/>
          <circle cx="32" cy="160" r="1" fill="currentColor" opacity="0.5" class="draw-dot" style="--to: 0.5; --d: 2.2s"/>
          <circle cx="160" cy="160" r="1" fill="currentColor" opacity="0.5" class="draw-dot" style="--to: 0.5; --d: 2.3s"/>
        </svg>
      </div>
      <!-- 标题区域 -->
      <div class="hero-text">
        <div class="hero-kicker fade-up" id="heroKicker">FRONTEND ENGINEER</div>
        <h1 class="hero-title fade-up" id="heroTitle" style="transition-delay: 0.1s">QxBit Studio</h1>
        <p class="hero-tagline fade-up" style="transition-delay: 0.2s"><span class="tagline-prompt">&gt;</span> <span id="heroTagline"></span><span class="tagline-cursor" id="taglineCursor"></span></p>
        <p class="hero-sub fade-up" id="heroSub" style="transition-delay: 0.3s">Web 前端 · CLI 工具 · 静态站点</p>
      </div>
    </div>
    <!-- 滚动指示器 -->
    <div class="scroll-hint" aria-hidden="true">
      <span class="scroll-line"></span>
    </div>
  </section>

  <!-- ========== 作品 ========== -->
  <section class="works" id="works">
    <div class="section-head fade-up">
      <span class="section-index">01</span>
      <h2 class="section-title">精选作品</h2>
    </div>

    <div class="works-grid" id="worksGrid">
      <!-- 动态卡片由 Data/config.json 渲染 -->
    </div>
  </section>

  <!-- ========== 服务 ========== -->
  <section class="services" id="services">
    <div class="section-head fade-up">
      <span class="section-index">02</span>
      <h2 class="section-title">服务能力</h2>
    </div>

    <div class="services-list" id="servicesList">
      <!-- 动态列表由 Data/config.json 渲染 -->
    </div>
  </section>

  <!-- ========== 页脚 ========== -->
  <footer class="footer" id="footer">
    <div class="footer-grid">
      <!-- 左侧 -->
      <div class="footer-brand">
        <svg class="logo-symbol logo-symbol--sm" viewBox="0 0 40 40" width="28" height="28">
          <path d="M20 2 A18 18 0 0 1 20 38 A18 18 0 0 1 20 2 Z M20 10.5 A9.5 9.5 0 0 1 20 29.5 A9.5 9.5 0 0 1 20 10.5 Z" fill="currentColor" fill-rule="evenodd"/>
          <line x1="18" y1="18" x2="38" y2="38" stroke="currentColor" stroke-width="8" stroke-linecap="round"/>
        </svg>
        <p class="footer-line" id="footerBrand">QxBit Studio</p>
        <p class="footer-line footer-line--dim" id="footerTagline">&gt; qxbit build</p>
      </div>
      <!-- 中间 -->
      <div class="footer-links">
        <a href="#works" class="footer-link">作品</a>
        <a href="#services" class="footer-link">服务</a>
        <a data-link="blog" class="footer-link" target="_blank" rel="noopener">Blog</a>
        <a data-link="email" class="footer-link">hello@qxbit.studio</a>
      </div>
      <!-- 右侧 - 社交 -->
      <div class="footer-social">
        <span class="footer-social-label">关注我</span>
        <div class="footer-social-icons" id="socialIcons">
          <!-- 动态图标由 Data/config.json 渲染 -->
        </div>
      </div>
    </div>
    <!-- 底部栏 -->
    <div class="footer-bottom">
      <span id="footerCopyright">&copy; 2026 QxBit Studio</span>
      <span class="footer-dot">·</span>
      <span>All rights reserved</span>
    </div>
  </footer>

  <!-- 动态渲染模板 -->
  <template id="workCardTemplate">
    <article class="work-card fade-up">
      <div class="work-thumb">
        <img src="" alt="" loading="lazy" class="work-img">
        <div class="work-overlay">
          <span class="work-tag"></span>
          <h3 class="work-name"></h3>
          <p class="work-desc"></p>
        </div>
      </div>
    </article>
  </template>

  <template id="serviceItemTemplate">
    <div class="service-item fade-up">
      <div class="service-inner">
        <span class="service-num"></span>
        <h3 class="service-name"></h3>
        <p class="service-desc"></p>
        <ul class="service-details"></ul>
      </div>
    </div>
  </template>

  <script src="./js/script.js"></script>
</body>
</html>
